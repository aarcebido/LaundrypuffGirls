<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LaundryPuff Girls - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <div class="logo-wrap">
        <img src="images-logo.jpg" alt="LaundryPuff Girls Logo" class="logo-img">
      </div>

      <h1>LaundryPuff Girls</h1>
      <div id="loginMessage" class="message"></div>

      <form id="loginForm">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="Enter your email" required>

        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="Enter your password" required>

        <button type="submit">Login</button>
      </form>

      <div class="divider">or</div>
      <a href="signup.html" class="auth-btn outline">Sign Up</a>
    </section>
  </main>

  <script src="app.js"></script>
  <button class="help-btn" onclick="showHelp()">?</button>
</body>
</html>
